framework: fastapi

runtime:
  docker: Dockerfile
  startup: docker build -t sample-repo . && docker run -d -p 8000:8000 --name sample-repo sample-repo
  build_timeout_seconds: 300
  timeout_seconds: 60
  session_timeout_seconds: 600

health:
  endpoint: /health
  port: 8000

tests:
  command: pytest

network:
  required: false
